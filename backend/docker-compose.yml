version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mysql_household
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: household_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_househol_data:/var/lib/mysql

volumes:
  mysql_househol_data: